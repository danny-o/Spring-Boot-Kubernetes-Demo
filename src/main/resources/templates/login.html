<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - ToDo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .auth-card { max-width: 400px; margin-top: 100px; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card auth-card shadow-sm w-100">
        <div class="card-body p-4">
            <h2 class="card-title text-center mb-4">Welcome Back</h2>

            <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
                Invalid username or password.
            </div>

            <div th:if="${param.logout}" class="alert alert-info py-2" role="alert">
                You have been logged out.
            </div>

            <form th:action="@{/auth/login}" th:object="${user}" method="post">
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="hashedPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Sign In</button>
                </div>
            </form>

            <div class="text-center mt-3">
                <span class="text-muted">New user?</span>
                <a th:href="@{/auth/register}" class="text-decoration-none">Register here</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
