<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit ToDo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow p-4">
            <h2 class="mb-4 text-center">Update ToDo</h2>
            <form th:action="@{/update-todo}" th:object="${todo}" method="post">
                <input type="hidden" th:field="*{id}" />
                <input type="hidden" th:field="*{username}" />

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <input type="text" th:field="*{description}" class="form-control" />
                    <div class="text-danger small" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Target Date</label>
                    <input type="date" th:field="*{targetDate}" class="form-control" />
                </div>

                <div class="form-check mb-4">
                    <input type="checkbox" class="form-check-input" th:field="*{done}" id="editDone">
                    <label class="form-check-label" for="editDone">Task Completed</label>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success btn-lg">Update Changes</button>
                    <a th:href="@{/}" class="btn btn-light">Go Back</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
